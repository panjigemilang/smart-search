<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Search</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Smart Search</h1>
    </header>
    
    <main>  
      <div class="scan-container">
        <button id="scan-btn" class="scan-btn">
          <div class="scan-ring"></div>
          <span class="scan-icon">⤧</span>
        </button>
        <p class="status-text">Tap to Scan Area</p>
      </div>    
      <p id="yandex-hint" class="hint-text" style="display: none; color: #fbbf24; border-color: rgba(251, 191, 36, 0.2);">
        <span style="font-size: 16px;">⚠️</span> <b>Note:</b> After scanning, press <b>Ctrl + V</b> in the new Yandex tab to paste the image.
      </p>
      <div class="settings">
        <div class="setting-row">
          <span class="label">Google Images</span>
          <label class="toggle">
            <input type="radio" name="engine" value="google" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="setting-row">
          <span class="label">Yandex Images</span>
          <label class="toggle">
            <input type="radio" name="engine" value="yandex">
            <span class="slider"></span>
          </label>
        </div>
      </div>      
      <p class="shortcut-hint">
        Shortcut: <b>Alt + S</b> to scan instantly
      </p>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
