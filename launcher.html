<!DOCTYPE html>
<html>
<head>
  <title>Searching...</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: system-ui, sans-serif;
    }
    .loading {
      text-align: center;
      animation: pulse 1s infinite alternate;
    }
    @keyframes pulse {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="loading">
    <h2>Uploading to smart search...</h2>
  </div>
  <script src="launcher.js"></script>
</body>
</html>
